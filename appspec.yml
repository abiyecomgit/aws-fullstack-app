version: 0.0
os: linux
files:
  - source: /
    destination: /var/www/app
permissions:
  - object: /
    pattern: "**"
    owner: ec2-user
    group: ec2-user
hooks:
  BeforeInstall:
    - location: scripts/create_app_dir.sh
      timeout: 60
      runas: ec2-user
    - location: scripts/application_stop.sh
      timeout: 300
      runas: ec2-user
  AfterInstall:
    - location: scripts/install.sh
      timeout: 600
      runas: ec2-user
  ApplicationStart:
    - location: scripts/application_start.sh
      timeout: 300
      runas: ec2-user
  ValidateService:
    - location: scripts/validate_service.sh
      timeout: 60
      runas: ec2-user
